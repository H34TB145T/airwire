name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-15
          - windows-2025
          - windows-11-arm

    steps:
      - uses: actions/checkout@v6

      - name: Test Windows installer with Windows PowerShell
        if: runner.os == 'Windows'
        shell: powershell
        env:
          AIRWIRE_INSTALL_DIR: ${{ runner.temp }}\airwire-installer-test
          AIRWIRE_TOR_DIR: ${{ runner.temp }}\airwire-tor-test
        run: |
          & .\install.ps1
          & "$env:AIRWIRE_INSTALL_DIR\airwire.exe" --version
          if (-not (Test-Path -LiteralPath $env:AIRWIRE_TOR_BINARY -PathType Leaf)) {
            throw "The installer did not configure AIRWIRE_TOR_BINARY"
          }
          & $env:AIRWIRE_TOR_BINARY --version

      - name: Install Linux audio headers
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: sudo apt-get -o Acquire::Retries=3 update && sudo apt-get -o Acquire::Retries=3 install --yes libasound2-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - run: cargo build --release --all-features
