name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset: airwire-linux-x86_64.tar.gz
            archive: tar
          - os: ubuntu-24.04-arm
            asset: airwire-linux-aarch64.tar.gz
            archive: tar
          - os: macos-15-intel
            asset: airwire-macos-x86_64.tar.gz
            archive: tar
          - os: macos-15
            asset: airwire-macos-aarch64.tar.gz
            archive: tar
          - os: windows-2025
            asset: airwire-windows-x86_64.zip
            archive: zip
          - os: windows-11-arm
            asset: airwire-windows-aarch64.zip
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux audio headers
        if: runner.os == 'Linux'
        timeout-minutes: 5
        run: sudo apt-get -o Acquire::Retries=3 update && sudo apt-get -o Acquire::Retries=3 install --yes libasound2-dev

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release --locked

      - name: Package Unix binary
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          mkdir package
          cp target/release/airwire package/airwire
          tar -C package -czf "${{ matrix.asset }}" airwire
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.asset }}" >"${{ matrix.asset }}.sha256"
          else
            shasum -a 256 "${{ matrix.asset }}" >"${{ matrix.asset }}.sha256"
          fi

      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory package | Out-Null
          Copy-Item target/release/airwire.exe package/airwire.exe
          Compress-Archive -Path package/airwire.exe -DestinationPath "${{ matrix.asset }}"
          $Hash = (Get-FileHash "${{ matrix.asset }}" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$Hash  ${{ matrix.asset }}" | Set-Content -NoNewline "${{ matrix.asset }}.sha256"

      - uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --verify-tag --generate-notes --title "Airwire ${GITHUB_REF_NAME}"
